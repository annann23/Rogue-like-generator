<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering:pixelated;image-rendering:crisp-edges;">
  <!-- 뿔 왼쪽 -->
  <rect x="4" y="0" width="2" height="5" fill="#6b0000"/>
  <rect x="3" y="4" width="3" height="2" fill="#8b0000"/>
  <!-- 뿔 오른쪽 -->
  <rect x="26" y="0" width="2" height="5" fill="#6b0000"/>
  <rect x="26" y="4" width="3" height="2" fill="#8b0000"/>
  <!-- 머리 -->
  <rect x="7" y="4" width="18" height="14" fill="#c00020"/>
  <rect x="5" y="6" width="2" height="10" fill="#b00018"/>
  <rect x="25" y="6" width="2" height="10" fill="#b00018"/>
  <!-- 눈 왼쪽 -->
  <rect x="9"  y="8" width="5" height="4" fill="#cc0000"/>
  <rect x="10" y="9" width="3" height="2" fill="#ffee00"/>
  <rect x="11" y="9" width="1" height="2" fill="#ff8800"/>
  <!-- 눈 오른쪽 -->
  <rect x="18" y="8" width="5" height="4" fill="#cc0000"/>
  <rect x="19" y="9" width="3" height="2" fill="#ffee00"/>
  <rect x="20" y="9" width="1" height="2" fill="#ff8800"/>
  <!-- 눈썹 -->
  <rect x="9"  y="7" width="3" height="1" fill="#500000"/>
  <rect x="20" y="7" width="3" height="1" fill="#500000"/>
  <!-- 코 -->
  <rect x="15" y="12" width="2" height="2" fill="#900010"/>
  <!-- 입 -->
  <rect x="10" y="15" width="12" height="2" fill="#500000"/>
  <rect x="9"  y="16" width="2" height="2" fill="#500000"/>
  <rect x="21" y="16" width="2" height="2" fill="#500000"/>
  <!-- 이빨 -->
  <rect x="11" y="17" width="2" height="2" fill="#ffffff"/>
  <rect x="14" y="17" width="2" height="2" fill="#ffffff"/>
  <rect x="17" y="17" width="2" height="2" fill="#ffffff"/>
  <rect x="20" y="17" width="2" height="2" fill="#ffffff"/>
  <!-- 목 -->
  <rect x="13" y="18" width="6" height="3" fill="#a00018"/>
  <!-- 몸통 -->
  <rect x="7"  y="21" width="18" height="9" fill="#900015"/>
  <rect x="9"  y="22" width="14" height="7" fill="#6a000e"/>
  <!-- 어깨 스파이크 -->
  <rect x="5"  y="20" width="3" height="5" fill="#8b0000"/>
  <rect x="24" y="20" width="3" height="5" fill="#8b0000"/>
  <!-- 팔 -->
  <rect x="3"  y="22" width="4" height="7" fill="#b00018"/>
  <rect x="25" y="22" width="4" height="7" fill="#b00018"/>
  <!-- 손톱/발톱 -->
  <rect x="2"  y="28" width="2" height="2" fill="#ff3030"/>
  <rect x="4"  y="29" width="2" height="2" fill="#ff3030"/>
  <rect x="26" y="28" width="2" height="2" fill="#ff3030"/>
  <rect x="28" y="29" width="2" height="2" fill="#ff3030"/>
  <!-- 하체 -->
  <rect x="8"  y="28" width="6" height="4" fill="#500008"/>
  <rect x="18" y="28" width="6" height="4" fill="#500008"/>
  <!-- 발굽 -->
  <rect x="8"  y="30" width="5" height="2" fill="#300005"/>
  <rect x="19" y="30" width="5" height="2" fill="#300005"/>
  <!-- 눈 광채 효과 -->
  <rect x="9"  y="8" width="1" height="1" fill="#ffff0060"/>
  <rect x="18" y="8" width="1" height="1" fill="#ffff0060"/>
</svg>
