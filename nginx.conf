# SPA용 nginx 설정. 8080 포트로 listen (비루트 권장).
# TanStack Router는 클라이언트 라우팅이므로 try_files fallback 필수.

server {
  listen       8080;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # gzip 압축
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # 보안 헤더
  add_header X-Frame-Options           "DENY"                              always;
  add_header X-Content-Type-Options    "nosniff"                           always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
  # CSP는 서비스 도메인/외부 자원에 맞춰 조정.
  # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

  # /assets 는 해시 파일명이므로 영구 캐시
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # 헬스체크 (Dockerfile HEALTHCHECK 대상)
  location = /healthz {
    access_log off;
    add_header Cache-Control "no-store";
    default_type text/plain;
    return 200 "ok\n";
  }

  # index.html 은 캐시 금지 (배포 즉시 반영)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: 알 수 없는 경로는 index.html 로
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 숨김 파일 차단
  location ~ /\. {
    deny all;
  }
}
