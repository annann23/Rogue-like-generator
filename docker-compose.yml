services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Template React MVP}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: template-react-mvp:latest
    container_name: template-react-mvp
    restart: unless-stopped
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # 비루트 사용자로 실행 (nginx alpine 의 nginx 유저)
    # 8080 포트라 권한 문제 없음
    read_only: false
    tmpfs:
      - /var/cache/nginx
      - /var/run
